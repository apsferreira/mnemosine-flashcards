name: CI/CD — flashcards.antoniopedro.com.br

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: apsferreira/mnemosine-flashcards

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build Next.js e verifica tipos
  # ──────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: cd apps/web && npx tsc --noEmit

      - name: Build Next.js
        run: npm run build:web
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ──────────────────────────────────────────────
  # Job 2: Docker build & push para GHCR
  # main → :latest + :sha-<short>
  # Pull requests: build only, sem push
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 3: Atualiza manifest K8s com nova tag
  # ArgoCD detecta a mudança e faz o deploy
  # ──────────────────────────────────────────────
  deploy:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    environment:
      name: production
      url: https://flashcards.antoniopedro.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in deployment
        run: |
          SHORT_SHA="${{ needs.docker.outputs.short_sha }}"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          sed -i "s|image: ghcr.io/apsferreira/mnemosine-flashcards:.*|image: ${NEW_IMAGE}|g" k8s/deployment.yaml
          sed -i "s|deploy-sha: .*|deploy-sha: \"sha-${SHORT_SHA}\"|g" k8s/deployment.yaml
          echo "Updated to: ${NEW_IMAGE}"

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): deploy sha-${{ needs.docker.outputs.short_sha }} [skip ci]"
          git pull --rebase origin main
          git push
