# =============================================================================
# Secret — Mnemosine Flashcards
#
# NÃO commitar com valores reais. Este é o template.
#
# Para criar no cluster (uma vez):
#   kubectl create namespace mnemosine --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl create secret generic mnemosine-secret \
#     --namespace mnemosine \
#     --from-literal=database-url="postgresql://postgres:SENHA_REAL@192.168.30.121:5432/mnemosine"
#
# Para verificar:
#   kubectl get secret mnemosine-secret -n mnemosine
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mnemosine-secret
  namespace: mnemosine
type: Opaque
stringData:
  database-url: "postgresql://postgres:CHANGE_ME@192.168.30.121:5432/mnemosine"
