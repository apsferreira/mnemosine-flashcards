# =============================================================================
# IngressRoute — Mnemosine Flashcards
# Domain: flashcards.antoniopedro.com.br
# Traefik como ingress controller (padrão K3s)
# TLS terminado no Cloudflare (mesmo padrão do antoniopedro-site)
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mnemosine
  namespace: mnemosine
  labels:
    app: mnemosine
    app.kubernetes.io/managed-by: argocd
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`flashcards.antoniopedro.com.br`)
      kind: Rule
      services:
        - name: mnemosine
          port: 80
